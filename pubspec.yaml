name: ciphering
description: Alias phone number platform for Indian users
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-1.png"
  adaptive_icon_foreground: "assets/images/logo-1.png"
  adaptive_icon_background: "#FFFFFF"
  ios_content_mode: "scaleAspectFill"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
